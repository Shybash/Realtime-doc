events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Use Render's internal DNS resolver for lazy upstream resolution
    resolver 10.0.0.53 valid=10s ipv6=off;
    resolver_timeout 10s;

    server {
        listen 8080;
        server_name localhost;

        # Auth Service REST Routing
        location /api/auth {
            set $auth_upstream "http://collabdocs-auth-service:5001";
            proxy_pass $auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Document Service REST Routing
        location /api/docs {
            set $doc_upstream "http://collabdocs-document-service:5000";
            proxy_pass $doc_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # GraphQL Routing
        location /graphql {
            set $graphql_upstream "http://collabdocs-document-service:5000";
            proxy_pass $graphql_upstream/graphql;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.IO Routing (WebSockets support)
        location /socket.io/ {
            set $socketio_upstream "http://collabdocs-document-service:5000";
            proxy_pass $socketio_upstream/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
