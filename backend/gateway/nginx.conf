events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 8080;
        server_name localhost;

        # Auth Service REST Routing
        location /api/auth {
            proxy_pass https://collabdocs-auth-service.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host collabdocs-auth-service.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Document Service REST Routing
        location /api/docs {
            proxy_pass https://collabdocs-document-service.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host collabdocs-document-service.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # GraphQL Routing
        location /graphql {
            proxy_pass https://collabdocs-document-service.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host collabdocs-document-service.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.IO Routing (WebSockets support)
        location /socket.io/ {
            proxy_pass https://collabdocs-document-service.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host collabdocs-document-service.onrender.com;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
