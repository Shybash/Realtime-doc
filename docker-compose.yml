version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: collabdocs-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - collabdocs-network

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: collabdocs-auth-service
    ports:
      - "5001:5001"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - PORT=5001
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:5173
    networks:
      collabdocs-network:
        aliases:
          - collabdocs-auth-service

  document-service:
    build:
      context: ./backend/services/document-service
      dockerfile: Dockerfile
    container_name: collabdocs-document-service
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:5173
    networks:
      collabdocs-network:
        aliases:
          - collabdocs-document-service

  notification-service:
    build:
      context: ./backend/services/notification-service
      dockerfile: Dockerfile
    container_name: collabdocs-notification-service
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - collabdocs-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collabdocs-frontend
    ports:
      - "5173:80"
    depends_on:
      - gateway
    networks:
      - collabdocs-network

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: collabdocs-api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_HOST=collabdocs-auth-service:5001
      - DOC_SERVICE_HOST=collabdocs-document-service:5000
    depends_on:
      auth-service:
        condition: service_started
      document-service:
        condition: service_started
    networks:
      - collabdocs-network

networks:
  collabdocs-network:
    driver: bridge
