services:
  # 1. Auth Service (Express REST API)
  - type: web
    name: collabdocs-auth-service
    env: docker
    dockerContext: backend/services/auth-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "5001"

  # 2. Document Service (REST + GraphQL + Socket.IO WebSockets)
  - type: web
    name: collabdocs-document-service
    env: docker
    dockerContext: backend/services/document-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "5000"

  # 3. Notification Service (Background Event Consumer + Healthcheck)
  - type: web
    name: collabdocs-notification-service
    env: docker
    dockerContext: backend/services/notification-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "3000"

  # 4. API Gateway (Nginx Proxy Router)
  - type: web
    name: collabdocs-api-gateway
    env: docker
    dockerContext: backend/gateway
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"

  # 5. Frontend (Static Site React Vite)
  - type: static
    name: collabdocs-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
