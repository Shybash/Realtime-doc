services:
  # 1. Auth Service (Express REST API)
  - type: web
    name: collabdocs-auth-service
    env: docker
    dockerContext: backend/services/auth-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 5001
      # Note: Set your REDIS_URL and Firebase Credentials in the Render Dashboard GUI

  # 2. Document Service (REST + GraphQL + Socket.IO WebSockets)
  - type: web
    name: collabdocs-document-service
    env: docker
    dockerContext: backend/services/document-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 5000
      # Note: Set your REDIS_URL and Firebase Credentials/JWT_SECRET in the Render Dashboard GUI

  # 3. Notification Service (Background Event Consumer)
  - type: worker
    name: collabdocs-notification-service
    env: docker
    dockerContext: backend/services/notification-service
    dockerfilePath: Dockerfile
    plan: starter # Render workers require the starter plan (min $7/mo)
    envVars:
      # Note: Set your REDIS_URL in the Render Dashboard GUI

  # 4. API Gateway (Nginx Proxy Router)
  - type: web
    name: collabdocs-api-gateway
    env: docker
    dockerContext: backend/gateway
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080

  # 5. Frontend (Static Site React Vite)
  - type: web
    name: collabdocs-frontend
    env: static
    rootDir: frontend
    buildCommand: npm run build
    publishDir: dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: collabdocs-api-gateway
          property: host
      - key: VITE_AUTH_URL
        fromService:
          type: web
          name: collabdocs-api-gateway
          property: host
