services:
  # 1. Auth Service (Express REST API)
  - type: web
    name: collabdocs-auth-service
    env: docker
    dockerContext: backend/services/auth-service
    dockerfilePath: backend/services/auth-service/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "5001"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: "production"

  # 2. Document Service (REST + GraphQL + Socket.IO WebSockets)
  - type: web
    name: collabdocs-document-service
    env: docker
    dockerContext: backend/services/document-service
    dockerfilePath: backend/services/document-service/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "5000"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: "production"

  # 3. Notification Service (Background Event Consumer + Healthcheck)
  - type: web
    name: collabdocs-notification-service
    env: docker
    dockerContext: backend/services/notification-service
    dockerfilePath: backend/services/notification-service/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "3000"
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: "production"

  # 4. API Gateway (Nginx Proxy Router)
  - type: web
    name: collabdocs-api-gateway
    env: docker
    dockerContext: backend/gateway
    dockerfilePath: backend/gateway/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: NGINX_ENTRYPOINT_LOCAL_RESOLVERS
        value: "1"
      - key: AUTH_SERVICE_HOST
        fromService:
          type: web
          name: collabdocs-auth-service
          property: hostport
      - key: DOC_SERVICE_HOST
        fromService:
          type: web
          name: collabdocs-document-service
          property: hostport

  # 5. Frontend (Static Site React Vite)
  - type: web
    name: collabdocs-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
