apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabdocs-frontend
  labels:
    app: collabdocs
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collabdocs
      component: frontend
  template:
    metadata:
      labels:
        app: collabdocs
        component: frontend
    spec:
      containers:
      - name: frontend
        image: collabdocs-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
