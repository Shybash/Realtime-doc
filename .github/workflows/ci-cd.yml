name: CollabDocs CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/services/auth-service/package.json
            backend/services/document-service/package.json
            backend/services/notification-service/package.json
            frontend/package-lock.json

      # Backend Verification (Services checking)
      - name: Install Backend Auth Service Deps
        run: |
          cd backend/services/auth-service
          npm install

      - name: Install Backend Document Service Deps
        run: |
          cd backend/services/document-service
          npm install

      - name: Install Backend Notification Service Deps
        run: |
          cd backend/services/notification-service
          npm install

      - name: Check Backend Services Syntax
        run: |
          node --check backend/services/auth-service/server.js
          node --check backend/services/document-service/server.js
          node --check backend/services/notification-service/server.js

      # Frontend Verification
      - name: Install Frontend Deps
        run: |
          cd frontend
          npm ci

      - name: Build Frontend (Test Compilation)
        run: |
          cd frontend
          npm run build

  test-docker-build:
    name: Verify Docker Builds (Dry Run)
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Auth Service Image
        run: |
          docker build -t collabdocs-auth-service:test backend/services/auth-service/

      - name: Build Document Service Image
        run: |
          docker build -t collabdocs-document-service:test backend/services/document-service/

      - name: Build Notification Service Image
        run: |
          docker build -t collabdocs-notification-service:test backend/services/notification-service/

      - name: Build API Gateway Image
        run: |
          docker build -t collabdocs-api-gateway:test backend/gateway/

      - name: Build Frontend Image
        run: |
          docker build -t collabdocs-frontend:test frontend/
